<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦄Pastel Movie Site🌈</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* FONT + BACKGROUND */
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(180deg, #F2F8FF 0%, #FDE7F2 100%);
            color: #555;
            opacity: 0;
            transition: opacity 1s ease;
        }

        :root {
            --pink: #F9C9E0;
            --pink-light: #FFE6F2;
            --blue: #B7DBFF;
            --blue-light: #E8F3FF;
            --white: #FFFFFF;
            --shadow-soft: 0 8px 22px rgba(180,180,255,0.25);
            --shadow-glow: 0 0 18px rgba(255,180,220,0.8);
        }

        /* NAVBAR */
        .pastel-nav {
            background: linear-gradient(to right, var(--blue), var(--pink));
            box-shadow: var(--shadow-soft);
        }
        .navbar-brand {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        /* BANNER */
        .banner {
            background: url('https://i.pinimg.com/1200x/07/9e/cd/079ecd13d7b71bbec643e95040a639fa.jpg') center/cover;
            height: 60vh;
            border-radius: 25px;
            margin: 25px;
            display: flex;
            align-items: flex-end;
            padding: 45px;
            color: white;
            text-shadow: 0 0 18px rgba(0,0,0,0.8);
            box-shadow: var(--shadow-soft);
        }

        .banner-text {
            font-size: 38px;
            font-weight: 700;
        }

        /* POSTER CARD */
        .movie-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow-soft);
            transition: 0.3s ease;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-glow);
        }

        /* อัตราส่วนโปสเตอร์หนัง */
        .a4-card {
            aspect-ratio: 2 / 3;
            display: flex;
            flex-direction: column;
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .movie-card h5 {
            text-align: center;
            margin-top: 12px;
            color: #6A7EFF;
            font-weight: 600;
        }

        /* SECTION TITLE */
        .section-title {
            margin-left: 25px;
            font-weight: 700;
            font-size: 28px;
            color: #6AA7FF;
        }

        /* BUTTON */
        .pastel-btn {
            background: linear-gradient(135deg, var(--pink), var(--blue));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .pastel-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--pink-light), var(--blue-light));
            color: #333;
        }

        /* INFO BOX */
        .content-box {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            margin: 25px;
            box-shadow: var(--shadow-soft);
        }

        /* FOOTER */
        .pastel-footer {
            background: linear-gradient(90deg, var(--blue), var(--pink));
            color: white;
            text-align: center;
            padding: 27px;
            font-weight: 500;
            margin-top: 40px;
        }
        .pastel-footer a {
            color: white;
            margin: 0 12px;
            font-size: 30px;
            transition: 0.3s;
        }
        .pastel-footer a:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg pastel-nav">
    <div class="container">
        <a class="navbar-brand">🦄PastelMovie🌈</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#movies">ภาพยนตร์</a></li>
                <li class="nav-item"><a class="nav-link" href="#about">เกี่ยวกับเรา</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">ติดต่อเรา</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- BANNER -->
<section class="banner">
    <h1 class="banner-text">🎟️ค้นพบหนังที่ใช่สำหรับคุณ</h1>
</section>

<!-- MOVIE SECTION -->
<h2 class="section-title" id="movies">ภาพยนตร์แนะนำ 🎥</h2>

<div class="container my-4">
    <div class="row g-4">

        <!-- ตัวอย่างการ์ด -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="movie-card a4-card">
                <img src="https://i.pinimg.com/736x/a4/77/6f/a4776fca4c877b399f62a41cbb0cc1b7.jpg">
                <h5>🐰Alice in Wonderland</h5>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <div class="movie-card a4-card">
                <img src="https://i.pinimg.com/736x/6b/b3/57/6bb357e27b5a96a635a8cad052fbca7c.jpg">
                <h5>🐦‍🔥Maleficent</h5>
            </div>
        </div>

    </div>
</div>

<!-- ABOUT -->
<div class="content-box" id="about">
    <h4>เกี่ยวกับเรา</h4>
    <p>เว็บภาพยนตร์โทนพาสเทลสบายตา สำหรับผู้ที่ชอบความนุ่มละมุน</p>
</div>

<!-- CONTACT -->
<div class="content-box" id="contact">
    <h4>ติดต่อเรา</h4>

    <label class="form-label">ชื่อ - นามสกุล</label>
    <input type="text" class="form-control mb-3">

    <label class="form-label">อีเมล</label>
    <input type="email" class="form-control mb-3">

    <label class="form-label">ข้อความ</label>
    <textarea class="form-control mb-3" rows="4"></textarea>

    <button class="btn pastel-btn w-100">ส่งข้อมูล</button>
</div>

<!-- FOOTER -->
<footer class="pastel-footer">
    <a href="#"><i class="bi bi-facebook"></i></a>
    <a href="#"><i class="bi bi-instagram"></i></a>
    <a href="#"><i class="bi bi-line"></i></a>
    <p>© 2025 Pastel Movie</p>
</footer>

<!-- JS -->
<script>
    document.body.style.opacity = "1";

    // Smooth Scroll
    document.querySelectorAll('a[href^="#"]').forEach(link => {
        link.addEventListener("click", function (e) {
            e.preventDefault();
            document.querySelector(this.getAttribute("href"))
                .scrollIntoView({ behavior: "smooth" });
        });
    });
</script>

</body>
</html>
